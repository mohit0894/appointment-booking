<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule a Meeting with Mohit</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;padding:20px;
display:flex;justify-content:center;align-items:center;
}
.card{
width:100%;max-width:900px;background:#fff;border-radius:24px;
padding:30px;box-shadow:0 20px 50px rgba(0,0,0,.2);
}
h1{text-align:center;color:#333}
.sub{text-align:center;color:#666;margin:10px 0 25px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:25px}
label{display:block;margin:10px 0 6px;font-weight:bold}
input,textarea{
width:100%;padding:12px;border:1px solid #ddd;border-radius:10px
}
.slots{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
gap:10px;max-height:500px;overflow:auto;
}
.slot{
border:2px solid #667eea;background:#fff;color:#667eea;
padding:10px;border-radius:10px;cursor:pointer;text-align:center
}
.slot.selected{background:#667eea;color:#fff}
button.submit{
width:100%;padding:14px;margin-top:15px;border:none;
background:#667eea;color:#fff;border-radius:10px;font-size:16px
}
#result{text-align:center;margin-top:15px;font-weight:bold}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="card">
<h1>Schedule a Meeting with Mohit</h1>
<div class="sub">Select a convenient date and time for your appointment</div>

<form id="appointmentForm">
<div class="grid">
<div>
<label>Full Name</label>
<input id="name" required>

<label>Mobile Number</label>
<input id="mobile" required>

<label>Email (Optional)</label>
<input id="email">

<label>Date</label>
<input type="date" id="date" required>
</div>

<div>
<label>Available Time Slots</label>
<div id="slotContainer" class="slots"></div>
<input type="hidden" id="time" required>

<label>Purpose</label>
<textarea id="purpose" rows="5"></textarea>
</div>
</div>

<button class="submit" type="submit">Book Appointment</button>
<div id="result"></div>
</form>
</div>

<script>
const WEBAPP_URL="https://script.google.com/macros/s/AKfycbv6ELtm3s8JVvhkqi0AiH3Lf1GqanVhJp1dh156kZjCwxERvjduwGKaLHYpru9JM2yKs0/exec";

document.getElementById("date").min=new Date().toISOString().split("T")[0];

const slots=[];
for(let h=6;h<=23;h++){
 for(let m of [0,30]){
  let hr=h%12||12;
  let ampm=h<12?"AM":"PM";
  slots.push(`${String(hr).padStart(2,"0")}:${String(m).padStart(2,"0")} ${ampm}`);
 }
}

document.getElementById("date").addEventListener("change",loadSlots);

async function loadSlots(){
 const date=document.getElementById("date").value;
 const c=document.getElementById("slotContainer");
 c.innerHTML="Loading...";

 try{
   const r=await fetch(WEBAPP_URL+"?date="+encodeURIComponent(date));
   const booked=await r.json();

   c.innerHTML="";
   slots.forEach(slot=>{
      if(!booked.includes(slot)){
        const b=document.createElement("div");
        b.className="slot";
        b.textContent=slot;
        b.onclick=()=>{
          document.querySelectorAll(".slot").forEach(x=>x.classList.remove("selected"));
          b.classList.add("selected");
          document.getElementById("time").value=slot;
        };
        c.appendChild(b);
      }
   });
 }catch(e){
   c.innerHTML="Error: "+e.message;
 }
}

document.getElementById("appointmentForm").addEventListener("submit",async e=>{
 e.preventDefault();

 if(!document.getElementById("time").value){
   alert("Please select a time slot");
   return;
 }

 const payload={
   name:name.value,
   mobile:mobile.value,
   email:email.value,
   date:date.value,
   time:time.value,
   purpose:purpose.value
 };

 const res=document.getElementById("result");
 res.innerHTML="Processing...";

 try{
   const r=await fetch(WEBAPP_URL,{method:"POST",body:JSON.stringify(payload)});
   const data=await r.json();

   if(data.status==="success"){
      res.style.color="green";
      res.innerHTML="âœ“ Appointment confirmed successfully";
      appointmentForm.reset();
      slotContainer.innerHTML="";
   }else{
      res.style.color="red";
      res.innerHTML=data.message;
   }
 }catch(err){
   res.style.color="red";
   res.innerHTML="Booking failed";
 }
});
</script>
</body>
</html>
