<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule a Meeting with Mohit</title>

<style>
*{
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#eef2ff,#dbeafe);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
padding:20px;
}

.card{
background:#fff;
width:100%;
max-width:600px;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.12);
}

h1{
text-align:center;
color:#1e3a8a;
margin-bottom:8px;
}

.subtitle{
text-align:center;
color:#64748b;
margin-bottom:25px;
}

label{
display:block;
margin-top:14px;
margin-bottom:6px;
font-weight:bold;
}

input,
select,
textarea{
width:100%;
padding:12px;
border:1px solid #cbd5e1;
border-radius:10px;
font-size:14px;
}

button{
width:100%;
padding:14px;
margin-top:20px;
background:#2563eb;
color:#fff;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

#message{
text-align:center;
margin-top:15px;
font-weight:bold;
}

.footer{
text-align:center;
margin-top:20px;
color:#94a3b8;
font-size:12px;
}
</style>

</head>

<body>

<div class="card">

<h1>Schedule a Meeting with Mohit</h1>

<p class="subtitle">
Select a convenient date and time
</p>

<form id="appointmentForm">

<label>Full Name</label>
<input type="text" id="name" required>

<label>Mobile Number</label>
<input type="text" id="mobile" required>

<label>Email (Optional)</label>
<input type="email" id="email">

<label>Date</label>
<input type="date" id="date" required>

<label>Time Slot</label>
<select id="time" required></select>

<label>Purpose</label>
<textarea id="purpose" rows="4"></textarea>

<button type="submit">
Book Appointment
</button>

</form>

<div id="message"></div>

<div class="footer">
Powered by Mohit Appointment Booking
</div>

</div>

<script>

const WEBAPP_URL =
"https://script.google.com/macros/s/AKfycbv6ELtm3s8JVvhkqi0AiH3Lf1GqanVhJp1dh156kZjCwxERvjduwGKaLHypru9JM2yKs0/exec";

document.getElementById("date").min =
new Date().toISOString().split("T")[0];

const timeSelect =
document.getElementById("time");

for(let h=6; h<=23; h++){

for(let m=0; m<60; m+=30){

let hour=((h+11)%12)+1;

let minute=String(m).padStart(2,"0");

let ampm=h>=12 ? "PM" : "AM";

let slot=
String(hour).padStart(2,"0")
+ ":" +
minute +
" " +
ampm;

let option =
document.createElement("option");

option.value = slot;
option.textContent = slot;

timeSelect.appendChild(option);

}

}

document.getElementById("appointmentForm").addEventListener("submit", async function(e){

e.preventDefault();

const message =
document.getElementById("message");

message.style.color="#2563eb";
message.textContent="Submitting...";

const payload = {

name:document.getElementById("name").value,
mobile:document.getElementById("mobile").value,
email:document.getElementById("email").value,
date:document.getElementById("date").value,
time:document.getElementById("time").value,
purpose:document.getElementById("purpose").value

};

try{

const response = await fetch(
WEBAPP_URL,
{
method:"POST",
headers:{
"Content-Type":"text/plain;charset=utf-8"
},
body:JSON.stringify(payload)
}
);

const result = await response.json();

if(result.status==="success"){

message.style.color="green";
message.textContent=result.message;

document.getElementById("appointmentForm").reset();

}
else{

message.style.color="red";
message.textContent=result.message;

}

}
catch(error){

message.style.color="red";
message.textContent="Unable to connect to booking server.";

console.log(error);

}

});

</script>

</body>
</html>
