<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule a Meeting with Mohit</title>
<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#4f46e5,#7c3aed);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:900px;
background:white;
border-radius:24px;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
padding:30px;
}

h1{
font-size:42px;
margin-bottom:10px;
text-align:center;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

label{
display:block;
font-weight:600;
margin-bottom:6px;
margin-top:12px;
}

input,
select,
textarea{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;
}

textarea{
resize:vertical;
}

button{
width:100%;
margin-top:25px;
padding:15px;
background:#4f46e5;
color:white;
border:none;
border-radius:12px;
font-size:16px;
font-weight:600;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

#result{
margin-top:15px;
font-weight:600;
text-align:center;
}

@media(max-width:768px){

.grid{
grid-template-columns:1fr;
}

h1{
font-size:32px;
}

}

</style>
</head>
<body>
<div class="container">
<h1>Schedule a Meeting with Mohit</h1>
<p class="subtitle">
Select a convenient date and time for your appointment
</p>
<form id="appointmentForm">
<div class="grid">
<div>
Full Name

Mobile Number

Email (Optional)

Select Date

</div>
<div>
Available Time Slots

<select id="time" required>
<option value="">Select Date First</option>
</select>
Purpose

<textarea id="purpose" rows="6"></textarea>
</div>
</div>
<button type="submit">
Book Appointment
</button>
<div id="result"></div>
</form>
</div>
<script>

const WEBAPP_URL =
"https://script.google.com/macros/s/AKfycbv6ELtm3s8JVvhkqi0AiH3Lf1GqanVhJp1dh156kZjCwxERvjduwGKaLHYpru9JM2yKs0/exec";

document.getElementById("date").min =
new Date().toISOString().split("T")[0];

const slots = [
"06:00 AM","06:30 AM",
"07:00 AM","07:30 AM",
"08:00 AM","08:30 AM",
"09:00 AM","09:30 AM",
"10:00 AM","10:30 AM",
"11:00 AM","11:30 AM",
"12:00 PM","12:30 PM",
"01:00 PM","01:30 PM",
"02:00 PM","02:30 PM",
"03:00 PM","03:30 PM",
"04:00 PM","04:30 PM",
"05:00 PM","05:30 PM",
"06:00 PM","06:30 PM",
"07:00 PM","07:30 PM",
"08:00 PM","08:30 PM",
"09:00 PM","09:30 PM",
"10:00 PM","10:30 PM",
"11:00 PM","11:30 PM"
];

async function loadSlots(){

let date =
document.getElementById("date").value;

if(!date) return;

try{

let response =
await fetch(
WEBAPP_URL + "?date=" + date
);

let booked =
await response.json();

let select =
document.getElementById("time");

select.innerHTML = "";

let count = 0;

slots.forEach(slot => {

if(!booked.includes(slot)){

let option =
document.createElement("option");

option.value = slot;
option.text = slot;

select.appendChild(option);

count++;

}

});

if(count === 0){

let option =
document.createElement("option");

option.text =
"No Slots Available";

select.appendChild(option);

}

}catch(error){

document.getElementById("time").innerHTML =
"<option>Error Loading Slots</option>";

}

}

document
.getElementById("appointmentForm")
.addEventListener("submit",
async function(e){

e.preventDefault();

const payload = {

name:
document.getElementById("name").value,

mobile:
document.getElementById("mobile").value,

email:
document.getElementById("email").value,

date:
document.getElementById("date").value,

time:
document.getElementById("time").value,

purpose:
document.getElementById("purpose").value

};

try{

const response =
await fetch(
WEBAPP_URL,
{
method:"POST",
body:JSON.stringify(payload)
}
);

const result =
await response.json();

const resultDiv =
document.getElementById("result");

if(result.status==="success"){

resultDiv.style.color="green";

resultDiv.innerHTML =
"Appointment booked successfully.";

document
.getElementById("appointmentForm")
.reset();

document
.getElementById("time")
.innerHTML =
"<option>Select Date First</option>";

}
else{

resultDiv.style.color="red";

resultDiv.innerHTML =
result.message;

}

}
catch(error){

document.getElementById("result").innerHTML =
"Unable to process request.";

}

});

</script>
</body>
</html>
